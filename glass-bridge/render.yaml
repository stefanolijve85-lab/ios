# Glass Bridge — Render Blueprint.
# In Render: New → Blueprint → point at this repo (root dir: glass-bridge).
# Provisions a managed PostgreSQL database and one single-origin web service
# (API + Socket.IO + static client). WebSockets work on all Render plans, so no
# separate Redis is required at this scale. To scale Socket.IO horizontally,
# add a Redis instance and the @socket.io/redis-adapter (see README).
databases:
  - name: glass-bridge-db
    plan: free
    databaseName: glassbridge
    user: glassbridge

services:
  - type: web
    name: glass-bridge
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    rootDir: glass-bridge
    healthCheckPath: /api/health
    autoDeploy: true
    # Run DB migrations + idempotent seed before each deploy goes live.
    preDeployCommand: 'node dist/db/migrate.js && node dist/db/seed.js'
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CLIENT_DIR
        value: public
      - key: DATABASE_URL
        fromDatabase:
          name: glass-bridge-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false # set in the dashboard
      - key: ADMIN_PASSWORD
        sync: false # set in the dashboard
      - key: STARTING_BALANCE
        value: 1000
      - key: HOUSE_EDGE
        value: 0.02
