<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#FF6B9D" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Poets Mee! 🦷</title>
<style>
  :root {
    --bg: #FF6B9D;
    --next-bg: #FF6B9D;
    --card: rgba(255,255,255,0.96);
    --shadow: 0 10px 30px rgba(0,0,0,.18);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Rounded",
      "Hiragino Maru Gothic ProN", system-ui, sans-serif;
    color: #fff;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  body {
    background: var(--bg);
    transition: background-color .8s ease;
    padding: calc(var(--safe-top) + 8px) 18px calc(var(--safe-bottom) + 14px);
    display: flex; flex-direction: column; gap: 12px;
    min-height: 100dvh;
  }

  header { text-align: center; }
  h1 { margin: 0; font-size: clamp(26px, 6vw, 36px); font-weight: 900; letter-spacing: .5px; }
  .subtitle { margin-top: 4px; font-size: clamp(14px, 3.5vw, 18px); opacity: .92; font-weight: 600; }

  .stage {
    flex: 1; min-height: 180px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .tooth {
    font-size: clamp(110px, 30vw, 180px);
    line-height: 1;
    transform-origin: 50% 80%;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,.22));
    transition: transform .25s ease;
  }
  .running .tooth { animation: wiggle 1s ease-in-out infinite; }
  .pop { animation: pop .45s cubic-bezier(.2,1.6,.4,1); }
  @keyframes wiggle {
    0%   { transform: rotate(0deg)   translateY(0); }
    25%  { transform: rotate(11deg)  translateY(-4px); }
    50%  { transform: rotate(0deg)   translateY(0); }
    75%  { transform: rotate(-11deg) translateY(-4px); }
    100% { transform: rotate(0deg)   translateY(0); }
  }
  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  .pep {
    position: absolute; bottom: 8px; left: 0; right: 0; text-align: center;
    font-size: clamp(18px, 5vw, 24px); font-weight: 800;
    text-shadow: 0 2px 8px rgba(0,0,0,.2);
    opacity: 0; transform: translateY(8px);
    transition: opacity .25s, transform .25s;
  }
  .running .pep { opacity: 1; transform: translateY(0); }

  .bubbles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .bubble {
    position: absolute; bottom: -40px;
    font-size: clamp(22px, 5vw, 32px);
    opacity: 0;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0)    scale(.6); opacity: 0; }
    15%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { transform: translateY(-90vh) scale(1.2); opacity: 0; }
  }

  .zone-card {
    background: var(--card); color: #222;
    border-radius: 22px; padding: 16px 18px;
    box-shadow: var(--shadow);
  }
  .zone-label { font-size: 12px; font-weight: 800; color: #888; letter-spacing: 1.6px; }
  .zone-name  { font-size: clamp(20px, 5.5vw, 28px); font-weight: 900; margin-top: 2px; }
  .zone-hint  { font-size: 14px; color: #555; margin-top: 4px; margin-bottom: 12px; }
  .track {
    height: 14px; border-radius: 7px; background: #EEE; overflow: hidden;
  }
  .fill {
    height: 100%; width: 2%;
    background: linear-gradient(90deg, #33C28E, #5BE3A6);
    border-radius: 7px;
    transition: width .9s linear;
  }

  .timer-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .timer {
    font-size: clamp(36px, 9vw, 48px); font-weight: 900;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  .dots { display: flex; gap: 10px; }
  .dot {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,.32);
    border: 2px solid rgba(255,255,255,.65);
    display: grid; place-items: center;
    color: #fff; font-weight: 900; font-size: 14px;
    transition: transform .2s, background-color .3s, border-color .3s;
  }
  .dot.active  { background: #fff; transform: scale(1.18); }
  .dot.done    { background: #33C28E; border-color: #33C28E; }
  .dot.done::after { content: "✓"; }

  .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .btn {
    appearance: none; border: 0; cursor: pointer;
    background: #FFD93D; color: #222;
    font-size: clamp(18px, 5vw, 22px); font-weight: 900;
    padding: 16px 28px; border-radius: 32px;
    width: 100%;
    box-shadow: 0 8px 22px rgba(0,0,0,.22);
    transition: transform .08s ease, opacity .15s;
    font-family: inherit;
  }
  .btn:active { transform: scale(.97); opacity: .85; }
  .btn.pause { background: #fff; }
  .btn.small {
    width: auto; padding: 9px 18px; font-size: 14px; font-weight: 700;
    background: rgba(0,0,0,.22); color: #fff; box-shadow: none; border-radius: 22px;
  }
  .btn.again { background: #7B5EA7; color: #fff; padding-left: 44px; padding-right: 44px; }

  /* Celebration */
  .celebrate {
    position: fixed; inset: 0;
    background: linear-gradient(180deg, #FFE066 0%, #FFB347 100%);
    color: #3A2A00;
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 24px;
    text-align: center;
    overflow: hidden;
  }
  .celebrate.show { display: flex; animation: fadeIn .5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  .celebrate .row { font-size: 36px; letter-spacing: 6px; margin-bottom: 12px; }
  .celebrate .big-tooth { font-size: clamp(120px, 32vw, 180px); margin-bottom: 8px;
    animation: bounce 1.4s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-12px) rotate(4deg); } }
  .celebrate h2 { margin: 0; font-size: clamp(28px, 8vw, 40px); font-weight: 900; }
  .celebrate p { font-size: clamp(15px, 4.2vw, 18px); font-weight: 600; color: #5C4400; margin: 12px 0 28px; max-width: 420px; }

  /* Confetti */
  .confetti-piece {
    position: absolute; top: -20px; width: 10px; height: 14px;
    opacity: .9; border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0); opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 1; }
  }

  /* Sound toggle */
  .sound-toggle {
    position: absolute; top: calc(var(--safe-top) + 10px); right: 14px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,.18); color: #fff;
    border: 0; font-size: 20px; cursor: pointer;
    display: grid; place-items: center;
  }
</style>
</head>
<body class="state-idle">
  <button id="soundBtn" class="sound-toggle" aria-label="Geluid aan/uit" title="Geluid aan/uit">🔊</button>

  <header>
    <h1>Poets je tanden!</h1>
    <div class="subtitle">2 minuten lang 💪</div>
  </header>

  <div class="stage">
    <div class="bubbles" id="bubbles" aria-hidden="true"></div>
    <div class="tooth" id="tooth">🦷</div>
    <div class="pep" id="pep">Lekker poetsen! 💪</div>
  </div>

  <section class="zone-card" aria-live="polite">
    <div class="zone-label">POETS NU</div>
    <div class="zone-name" id="zoneName">↗️ Boven Rechts</div>
    <div class="zone-hint" id="zoneHint">Poets de bovenkant rechts</div>
    <div class="track"><div class="fill" id="zoneFill"></div></div>
  </section>

  <div class="timer-row">
    <div class="timer" id="timer">02:00</div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="controls">
    <button class="btn" id="primaryBtn">Start! 🚀</button>
    <button class="btn small" id="resetBtn" hidden>Opnieuw 🔄</button>
  </div>

  <div class="celebrate" id="celebrate" aria-hidden="true">
    <div class="row">🎉 ✨ 🌟 ✨ 🎉</div>
    <div class="big-tooth">🦷</div>
    <h2>Super gedaan!</h2>
    <p>Je hebt 2 minuten gepoetst.<br/>Je tanden zijn nu blinkend schoon! ✨</p>
    <button class="btn again" id="againBtn">Nog een keer 🦷</button>
  </div>

<script>
(() => {
  const ZONES = [
    { name: 'Boven Rechts', emoji: '↗️', hint: 'Poets de bovenkant rechts', color: '#FF6B9D' },
    { name: 'Boven Links',  emoji: '↖️', hint: 'Nu de bovenkant links',     color: '#4ECDC4' },
    { name: 'Onder Links',  emoji: '↙️', hint: 'Door naar onder links',     color: '#FFA552' },
    { name: 'Onder Rechts', emoji: '↘️', hint: 'Laatste stuk: onder rechts', color: '#7B5EA7' },
  ];
  const ZONE_DURATION = 30; // seconds per zone
  const TOTAL = ZONE_DURATION * ZONES.length; // 120s
  const PEP = ['Lekker poetsen! 💪','Goed bezig! ✨','Doorgaan! 🌟','Knap hoor! 🦷','Bijna! 🚀'];
  const BUBBLE_EMOJIS = ['✨','💧','🫧','⭐️','💫','🦷'];

  const $ = (id) => document.getElementById(id);
  const body       = document.body;
  const tooth      = $('tooth');
  const zoneName   = $('zoneName');
  const zoneHint   = $('zoneHint');
  const zoneFill   = $('zoneFill');
  const timerEl    = $('timer');
  const dotsEl     = $('dots');
  const primaryBtn = $('primaryBtn');
  const resetBtn   = $('resetBtn');
  const pepEl      = $('pep');
  const bubblesEl  = $('bubbles');
  const celebrate  = $('celebrate');
  const againBtn   = $('againBtn');
  const soundBtn   = $('soundBtn');

  // Zone dots
  ZONES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.dataset.index = i;
    dotsEl.appendChild(d);
  });
  const dotEls = [...dotsEl.children];

  // Build floating bubbles
  for (let i = 0; i < 8; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = BUBBLE_EMOJIS[i % BUBBLE_EMOJIS.length];
    b.style.left = `${(i * 13 + 6) % 90}%`;
    b.style.animationDuration = `${2.4 + (i % 4) * 0.5}s`;
    b.style.animationDelay = `${(i * 0.35).toFixed(2)}s`;
    bubblesEl.appendChild(b);
  }

  // ---- Audio (Web Audio API, no files needed) ----
  let audioCtx = null;
  let soundOn = true;
  function ensureAudio() {
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function beep(freq, dur = 0.15, type = 'sine', gain = 0.18) {
    if (!soundOn) return;
    const ctx = ensureAudio();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(gain, ctx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur + 0.02);
  }
  function chime() {
    [523.25, 659.25, 783.99, 1046.5].forEach((f, i) =>
      setTimeout(() => beep(f, 0.22, 'triangle', 0.16), i * 110)
    );
  }
  function fanfare() {
    [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((f, i) =>
      setTimeout(() => beep(f, 0.3, 'triangle', 0.2), i * 130)
    );
  }
  function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

  soundBtn.addEventListener('click', () => {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    if (soundOn) beep(660, 0.1);
  });

  // ---- State / loop ----
  let state = 'idle'; // 'idle' | 'running' | 'paused' | 'done'
  let seconds = 0;
  let tickHandle = null;

  function setBg(color) {
    body.style.backgroundColor = color;
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', color);
  }

  function render() {
    const zoneIndex = Math.min(Math.floor(seconds / ZONE_DURATION), ZONES.length - 1);
    const zone = ZONES[zoneIndex];
    const zoneSecs = seconds % ZONE_DURATION;
    const remaining = TOTAL - seconds;
    const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
    const ss = String(remaining % 60).padStart(2, '0');

    timerEl.textContent = `${mm}:${ss}`;
    zoneName.textContent = `${zone.emoji}  ${zone.name}`;
    zoneHint.textContent = zone.hint;
    zoneFill.style.width = `${Math.max(2, (zoneSecs / ZONE_DURATION) * 100)}%`;

    dotEls.forEach((d, i) => {
      d.classList.toggle('done', i < zoneIndex || state === 'done');
      d.classList.toggle('active', i === zoneIndex && state === 'running');
    });

    if (state !== 'done') setBg(zone.color);
  }

  function setControls() {
    if (state === 'running') {
      primaryBtn.textContent = 'Pauze ⏸';
      primaryBtn.classList.add('pause');
    } else {
      primaryBtn.classList.remove('pause');
      primaryBtn.textContent = seconds > 0 ? 'Verder ▶️' : 'Start! 🚀';
    }
    resetBtn.hidden = seconds === 0;
  }

  function popTooth() {
    tooth.classList.remove('pop');
    void tooth.offsetWidth; // restart animation
    tooth.classList.add('pop');
  }

  function rotatePep() {
    const idx = Math.floor(seconds / 10) % PEP.length;
    pepEl.textContent = PEP[idx];
  }

  function start() {
    ensureAudio();
    if (state === 'done') reset(false);
    state = 'running';
    body.classList.add('running');
    beep(880, 0.12, 'sine', 0.15);
    vibrate(20);
    setControls();
    rotatePep();
    if (tickHandle) clearInterval(tickHandle);
    tickHandle = setInterval(tick, 1000);
  }

  function pause() {
    state = 'paused';
    body.classList.remove('running');
    beep(440, 0.1, 'sine', 0.12);
    vibrate(10);
    if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
    setControls();
  }

  function reset(rerender = true) {
    state = 'idle';
    seconds = 0;
    body.classList.remove('running');
    if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
    celebrate.classList.remove('show');
    celebrate.setAttribute('aria-hidden', 'true');
    [...celebrate.querySelectorAll('.confetti-piece')].forEach(c => c.remove());
    if (rerender) {
      setControls();
      render();
    }
  }

  function finish() {
    state = 'done';
    body.classList.remove('running');
    if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
    setControls();
    fanfare();
    vibrate([60, 40, 60, 40, 120]);
    showCelebration();
  }

  function tick() {
    seconds = Math.min(seconds + 1, TOTAL);
    if (seconds >= TOTAL) {
      render();
      finish();
      return;
    }
    if (seconds % ZONE_DURATION === 0) {
      chime();
      vibrate([30, 50, 30]);
      popTooth();
    }
    if (seconds % 10 === 0) rotatePep();
    render();
  }

  function showCelebration() {
    celebrate.classList.add('show');
    celebrate.setAttribute('aria-hidden', 'false');
    const colors = ['#FF6B9D','#4ECDC4','#FFD93D','#7B5EA7','#33C28E','#FFA552'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = `${Math.random() * 100}%`;
      piece.style.background = colors[i % colors.length];
      piece.style.animationDuration = `${2 + Math.random() * 2.5}s`;
      piece.style.animationDelay = `${Math.random() * 0.6}s`;
      piece.style.transform = `rotate(${Math.random() * 360}deg)`;
      celebrate.appendChild(piece);
    }
  }

  primaryBtn.addEventListener('click', () => {
    if (state === 'running') pause();
    else start();
  });
  resetBtn.addEventListener('click', () => reset());
  againBtn.addEventListener('click', () => { reset(); start(); });

  // Spacebar = play/pause
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); primaryBtn.click(); }
    if (e.code === 'KeyR')  { reset(); }
  });

  render();
  setControls();
})();
</script>
</body>
</html>
