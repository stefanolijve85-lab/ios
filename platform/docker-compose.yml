name: trustline

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: trustline
      POSTGRES_USER: trustline
      POSTGRES_PASSWORD: trustline
    ports: ["5432:5432"]
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./api/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: ./api
    env_file: ./api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://trustline:trustline@db:5432/trustline
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-do-not-use-in-prod-32bytes
      CORS_ORIGINS: http://localhost:3000
    ports: ["8000:8000"]
    depends_on: [db, redis]
    volumes:
      - ./api/app:/srv/app:ro

  worker:
    build: ./api
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=INFO"]
    env_file: ./api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://trustline:trustline@db:5432/trustline
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-do-not-use-in-prod-32bytes
    depends_on: [db, redis]
    volumes:
      - ./api/app:/srv/app:ro

  web:
    build: ./web
    environment:
      API_BASE_URL: http://api:8000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  dbdata:
